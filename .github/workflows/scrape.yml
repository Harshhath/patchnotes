name: Scrape Patch Notes

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 python-dotenv groq psycopg2-binary

      - name: Run scraper
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BUNGIE_API_KEY: ${{ secrets.BUNGIE_API_KEY }}
        run: python scraper.py

      - name: Push to Supabase
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python database.py

      - name: Commit updated hash + JSON files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add hash_valorant.txt patches_valorant.json hash_cs2.txt patches_cs2.json hash_destiny2.txt patches_destiny2.json
          git diff --staged --quiet || git commit -m "chore: update patch data [skip ci]"
          git push